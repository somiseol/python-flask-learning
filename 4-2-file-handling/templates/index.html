{% extends "base.html" %}
{% block title %}index{% endblock %}

{% block content %}

<h1>login</h1>
	<!--- action is the target url we're sending the POST request to --->
	<form method="POST" action="{{ url_for('index') }}">
		<input type="text" name="username" placeholder="Username"><br>
		<input type="password" name="password" placeholder="Password"><br>
		<input type="submit" value="Login">
		<!--- "name" is the key to the key-value pair in the backend--->
		<!--- "placeholder" is the text that shows up as place holder in the text input field --->
	</form>



	<h1>file upload</h1>
	<form method="POST" action="{{ url_for('file_upload') }}" enctype="multipart/form-data">
			<input type="file" name="file" accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel, text/plain" required="required"> <!--- need to specify what kind of files to accept --->
		<input type="submit" value="upload file">
	</form>



	<h1>convert from xlsx to csv</h1>
	<form method="POST" action="{{ url_for('excel_to_csv') }}" enctype="multipart/form-data">
		<input type="file" name="file" accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" required="required">

		<input type="submit" value="upload file">
	</form>



	<h1>convert to csv</h1>
	<form method="POST" action="{{ url_for('convert_csv') }}" enctype="multipart/form-data">
		<input type="file" name="file" accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" required="required">

		<input type="submit" value="upload file">
	</form>
{% endblock %}
